{% extends "base.html" %}
{% load ru_plural %}

{% block content %}
<div class="card" style="max-width:500px;margin:60px auto;text-align:center;padding:36px;">
  <div style="font-size:48px;margin-bottom:12px;">🔒</div>
  <h1 style="font-size:24px;margin-bottom:10px;">Доступ временно ограничен</h1>
  <p style="color:var(--muted);font-size:15px;margin-bottom:6px;">
    Слишком много неудачных попыток входа.
  </p>
  <p style="color:var(--muted);font-size:15px;">
    Попробуйте снова через
    <strong>{{ cooloff_time_seconds|seconds_to_human }}</strong>.
  </p>
  <p style="color:var(--muted);font-size:13px;margin-top:18px;">
    Вы будете перенаправлены на главную через <span id="countdown">5</span> секунд.
  </p>
  <a href="{% url 'portal_home' %}" class="btn" style="margin-top:20px;display:inline-block;">
    Перейти на главную сейчас
  </a>
</div>
<script>
  let seconds = 5;
  const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = "{% url 'portal_home' %}";
    } else {
      el.textContent = seconds;
    }
  }, 1000);
</script>
{% endblock %}
