{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет преподавателя — Лекторий</title>
<style>
:root{--bg:#F8FAFC;--surface:#fff;--text:#1E293B;--muted:#64748B;--accent:#4F46E5;--accent-soft:#EEF2FF;--border:#E2E8F0;--ok:#16A34A;--danger:#DC2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
main{flex:1}
.container{max-width:860px;margin:0 auto;padding:0 20px}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 0;margin-bottom:28px}
.topbar .container{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:800;font-size:18px;color:var(--text);text-decoration:none}
.brand b{color:var(--accent)}
.topbar nav{margin-left:auto;display:flex;gap:10px;align-items:center}
.topbar a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
.topbar a:hover{color:var(--accent)}
.btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 26px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;text-decoration:none}
.btn:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--accent-soft);color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px}
h1{font-size:24px;margin-bottom:6px}
.sub{color:var(--muted);font-size:14.5px;margin-bottom:22px}
.f-group{margin-bottom:18px}
.f-label{display:block;font-weight:700;font-size:15px;margin-bottom:6px}
.f-hint{font-size:13px;color:var(--muted);margin-top:5px}
.f-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font:inherit;font-size:15px;background:#fff}
.f-input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft)}
.f-error{color:var(--danger);font-size:13.5px;margin-top:5px}
.f-section{border-top:1px dashed var(--border);margin-top:24px;padding-top:20px}
.f-section h3{font-size:16px;margin-bottom:4px}
.f-section .f-hint{margin-bottom:14px}
.msg{padding:13px 16px;border-radius:11px;margin-bottom:18px;font-size:14.5px}
.msg-ok{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.msg-err{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
table{width:100%;border-collapse:collapse;font-size:14.5px}
th{text-align:left;color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid var(--border)}
td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pill{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px}
.pill-on{background:#F0FDF4;color:#15803D}
.pill-off{background:#F1F5F9;color:var(--muted)}
.mini{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}
.mini:hover{text-decoration:underline}
.empty{text-align:center;color:var(--muted);padding:36px 0}
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{position:relative;cursor:pointer}
.chip input{position:absolute;opacity:0;pointer-events:none}
.chip span{display:inline-block;padding:10px 18px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:14.5px;font-weight:600;color:var(--muted);transition:.15s}
.chip:hover span{border-color:var(--accent);color:var(--accent)}
.chip input:checked + span{background:var(--accent);border-color:var(--accent);color:#fff}
.chip input:focus-visible + span{box-shadow:0 0 0 3px var(--accent-soft)}
.file-btn{display:inline-block;background:var(--accent);color:#fff;border-radius:12px;padding:12px 24px;font-weight:700;font-size:15px;cursor:pointer;transition:.15s}
.file-btn:hover{filter:brightness(1.1)}
.file-name{margin-left:12px;font-size:14px;color:var(--muted)}
input[type=file]{display:none}
footer{margin-top:40px;border-top:1px solid var(--border);padding:20px;color:var(--muted);font-size:13px;text-align:center}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.mats{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.teach-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
</style>
</head>
<body>
<div class="topbar">
  <div class="container">
    <a class="brand" href="{% url 'portal_home' %}"><b>Л</b> Лекторий</a>
    <nav>
      <span style="font-size:14px;color:var(--muted)">{{ teacher.display_name }}</span>
      <a href="{% url 'portal_home' %}">На сайт</a>
      <a href="{% url 'desk_password' %}">Сменить пароль</a>
      <a href="{% url 'admin:logout' %}">Выйти</a>
    </nav>
  </div>
</div>
<main class="container">
  {% if messages %}
    {% for m in messages %}
      <div class="msg {% if m.tags == 'success' %}msg-ok{% else %}msg-err{% endif %}">{{ m }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</main>
<footer>Кабинет преподавателя · Лекторий</footer>
</body>
</html>
